# Override for servers that already run Traefik.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d
#
# Prerequisites:
#   1. External Docker network shared with Traefik (default name: proxy)
#      docker network ls | grep proxy
#      docker network create proxy   # only if missing; Traefik must use the same network
#   2. DNS A/CNAME for N8N_DOMAIN → server IP
#   3. .env: N8N_DOMAIN, N8N_HOST, N8N_PROTOCOL=https, WEBHOOK/EDITOR URLs
#   4. TRAEFIK_ENTRYPOINT / TRAEFIK_CERT_RESOLVER must match your Traefik config

services:
  n8n:
    networks:
      traefik: {}
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-proxy}
      - traefik.http.routers.hh-n8n.rule=Host(`${N8N_DOMAIN:?set N8N_DOMAIN in .env}`)
      - traefik.http.routers.hh-n8n.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.hh-n8n.tls=true
      - traefik.http.routers.hh-n8n.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.hh-n8n.service=hh-n8n
      - traefik.http.services.hh-n8n.loadbalancer.server.port=5678

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}
