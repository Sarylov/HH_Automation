name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  GHCR_OWNER: ${{ vars.GHCR_OWNER || github.repository_owner }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image namespace
        id: ns
        run: |
          owner="$(echo "${{ env.GHCR_OWNER }}" | tr '[:upper:]' '[:lower:]')"
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.ns.outputs.owner }}/hh-backend:latest
            ${{ env.REGISTRY }}/${{ steps.ns.outputs.owner }}/hh-backend:${{ steps.ns.outputs.sha_tag }}
          cache-from: type=gha,scope=hh-backend
          cache-to: type=gha,mode=max,scope=hh-backend

      - name: Build and push playwright
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.playwright
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.ns.outputs.owner }}/hh-playwright:latest
            ${{ env.REGISTRY }}/${{ steps.ns.outputs.owner }}/hh-playwright:${{ steps.ns.outputs.sha_tag }}
          cache-from: type=gha,scope=hh-playwright
          cache-to: type=gha,mode=max,scope=hh-playwright

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          envs: GHCR_OWNER,GHCR_READ_TOKEN
          script: |
            set -eu
            cd "${{ secrets.DEPLOY_PATH }}"

            if [ -n "${GHCR_READ_TOKEN:-}" ]; then
              echo "${GHCR_READ_TOKEN}" | docker login ghcr.io -u "${GHCR_OWNER}" --password-stdin
            fi

            if [ -d .git ]; then
              git fetch --prune origin main
              git checkout main
              git pull --ff-only origin main
            fi

            export GHCR_OWNER="${GHCR_OWNER}"
            export IMAGE_TAG=latest

            docker compose -f docker-compose.yml -f docker-compose.traefik.yml pull backend playwright
            docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d
        env:
          GHCR_OWNER: ${{ steps.ns.outputs.owner }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
